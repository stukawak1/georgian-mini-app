<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B2C"/>
      <stop offset="100%" stop-color="#FFB547"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="512" height="512" rx="108"/>
    </clipPath>
  </defs>
  <rect width="512" height="512" rx="108" fill="#0E0E0E"/>
  <!-- Subtle grid lines -->
  <rect x="244" y="60" width="24" height="392" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="60" y="244" width="392" height="24" rx="4" fill="rgba(255,255,255,0.06)"/>
  <!-- Georgian letter ა in gradient -->
  <text x="256" y="318" font-family="Georgia,serif" font-size="260"
        text-anchor="middle" fill="url(#grad)">ა</text>
</svg>
